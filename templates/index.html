<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambahkan Gejala</title>
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->
    <!-- <style type="text/tailwindcss">
        @theme {
        --color-clifford: #da373d;
        }
    </style> -->
    

</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-2xl flex flex-col py-18">
        <h1 class="text-center text-4xl font-bold text-cyan-300 mb-8 tracking-wide">SISTEM PAKAR DETEKSI PENYAKIT JANTUNG</h1>
        
        <form action="/predict" method="POST" class="border-2 border-cyan-500 rounded-lg p-8 bg-slate-800 bg-opacity-50 backdrop-blur shadow-xl/20 shadow-cyan-500">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Umum -->
                <div class="md:col-span-2">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Umur</label>
                    <input type="number" name="age" placeholder="Masukkan angka" class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500" required>
                </div>

                <!-- Jenis Kelamin -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Jenis Kelamin</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="gender" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10" required>
                        <option class="text-black">Pilih Kategori...</option>
                        <option value="Male">Pria</option>
                        <option value="Female">Wanita</option>
                    </select>
                </div>

                <!-- Tekanan Darah -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">Tekanan Darah</label>
                    <input type="number" name="blood_pressure" placeholder="Masukkan angka" class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500">
                </div>

                <!-- Level Kolestrol -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">Level Kolestrol</label>
                    <input type="number" name="cholesterol_level" placeholder="Masukkan angka" class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500">
                </div>

                <!-- Jam Tidur -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">Jam Tidur</label>
                    <input type="number" name="sleep_hours" placeholder="Masukkan angka" class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500">
                </div>

                <!-- Perokok -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Perokok</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="smoking" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10">
                        <option class="">Pilih Kategori...</option>
                        <option value="Yes">Ya</option>
                        <option value="No">Tidak</option>
                    </select>
                </div>

                <!-- Penyakit Jantung Keluarga -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Penyakit Jantung Keluarga</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="family_heart_disease" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10">
                        <option>Pilih Kategori...</option>
                        <option value="Yes">Ya</option>
                        <option value="No">Tidak</option>
                    </select>
                </div>

                <!-- Tingkat Konsumsi Alkohol -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Tingkat Konsumsi Alkohol</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="alcohol_consumption" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10">
                        <option>Pilih Tingkatan...</option>
                        <option value="Low">Rendah</option>
                        <option value="Medium">Sedang</option>
                        <option value="High">Tinggi</option>
                    </select>
                </div>

                <!-- Kebiasaan Latihan -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Kebiasaan Latihan</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="exercise_habits" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10">
                        <option>Pilih Tingkatan...</option>
                        <option value="Low">Rendah</option>
                        <option value="Medium">Sedang</option>
                        <option value="High">Tinggi</option>
                    </select>
                </div>

                <!-- BMI -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">BMI</label>
                    <input type="number" name="bmi" placeholder="Masukkan angka" class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500">
                </div>

                <!-- Level CRP -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">Level CRP</label>
                    <input type="number" name="crp_level" placeholder="Masukkan angka" class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500">
                </div>

                <!-- Diabetes -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Diabetes</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="diabetes" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10">
                        <option>Pilih Kategori...</option>
                        <option value="Yes">Ya</option>
                        <option value="No">Tidak</option>
                    </select>
                </div>

                <!-- Tekanan Darah Tinggi -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Tekanan Darah Tinggi</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="high_blood_pressure" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10">
                        <option>Pilih Kategori...</option>
                        <option value="Yes">Ya</option>
                        <option value="No">Tidak</option>
                    </select>
                </div>

                <!-- Kolestrol HDL Rendah -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Kolestrol HDL Rendah</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="low_hdl_cholesterol" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10">
                        <option>Pilih Kategori...</option>
                        <option value="Yes">Ya</option>
                        <option value="No">Tidak</option>
                    </select>
                </div>

                <!-- Kolestrol HDL Tinggi -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Kolestrol HDL Tinggi</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="high_ldl_cholesterol" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10">
                        <option>Pilih Kategori...</option>
                        <option value="Yes">Ya</option>
                        <option value="No">Tidak</option>
                    </select>
                </div>

                <!-- Level Stress -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Level Stress</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="stress_level" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10">
                        <option>Pilih Tingkatan...</option>
                        <option value="Low">Rendah</option>
                        <option value="Medium">Sedang</option>
                        <option value="High">Tinggi</option>
                    </select>
                </div>

                <!-- Konsumsi Gula -->
                <div class="relative">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Konsumsi Gula</label>
                    <div class="absolute right-3 top-9 pointer-events-none">
                        <svg class="w-6 h-6 text-blue-300 dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
                        </svg>


                    </div>
                    <select name="sugar_consumption" class="w-full bg-slate-700 border-3 border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 appearance-none cursor-pointer pr-10">
                        <option>Pilih Tingkatan...</option>
                        <option value="Low">Rendah</option>
                        <option value="Medium">Sedang</option>
                        <option value="High">Tinggi</option>
                    </select>
                </div>

                <!-- Tingkat Trigliserida -->
                <div class="md:col-span-2">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Tingkat Trigliserida</label>
                    <input type="number" name="triglyceride_level" placeholder="Masukkan angka" class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500">
                </div>

                <!-- Gula Darah Puasa -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">Gula Darah Puasa</label>
                    <input type="number" name="fasting_blood_sugar" placeholder="Masukkan angka" class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500">
                </div>

                <!-- Level CRP (2) -->
                <!-- <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">Level CRP</label>
                    <input type="text" placeholder="Masukkan angka" class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500">
                </div> -->

                <!-- Tingkat Homosistein -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">Tingkat Homosistein</label>
                    <input type="number" name="homocysteine_level" placeholder="Masukkan angka" class="w-full bg-slate-700 border border-slate-600 rounded px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500">
                </div>

                <!-- Submit Button -->
                <div class="md:col-span-2 mt-6">
                    <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-cyan-600 hover:from-cyan-600 hover:to-cyan-700 text-white font-semibold py-3 rounded transition-all duration-200 transform hover:scale-105">
                        SUBMIT
                    </button>
                </div>
            </div>
        </form>
    </div>
</body>



</html>
